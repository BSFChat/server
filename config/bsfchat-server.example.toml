[server]
name = "localhost"
bind_address = "0.0.0.0"
port = 8448
workers = 4

[database]
path = "./data/bsfchat.db"

[media]
path = "./data/media/"
max_upload_size_mb = 500

[auth]
registration_enabled = true
password_hash_cost = 12

# Storage backend for media files
# type = "local" stores files on disk, "s3" uses S3-compatible object storage
[storage]
type = "local"

[storage.s3]
endpoint = "http://localhost:9002"
access_key = "minioadmin"
secret_key = "minioadmin"
bucket = "bsfchat-media"
region = "us-east-1"
use_path_style = true

[voice]
enabled = true

# Public STUN (covers ~70% of NAT setups with no infrastructure from you).
stun_uri = "stun:stun.l.google.com:19302"

# For full coverage (symmetric NAT, strict firewalls), run your own TURN
# relay — e.g. `apt install coturn` on the same box — and point at it:
# turn_uri = "turn:turn.yourdomain.com:3478"
# turn_username = "bsfchat"
# turn_password = "<random-secret>"

# P2P is fine for a Discord-style chat. Disable only if you've deployed
# TURN and want every call forced through the relay (privacy over cost).
allow_peer_to_peer = true

[tls]
enabled = false
cert_file = ""
key_file = ""

# Optional: BSFChat ID identity provider
[identity]
provider_url = "http://localhost:8480"
required = false
allow_local_accounts = true
