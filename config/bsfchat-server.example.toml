[server]
name = "localhost"
bind_address = "0.0.0.0"
port = 8448
workers = 4

[database]
path = "./data/bsfchat.db"

[media]
path = "./data/media/"
max_upload_size_mb = 50

[auth]
registration_enabled = true
password_hash_cost = 12

# Storage backend for media files
# type = "local" stores files on disk, "s3" uses S3-compatible object storage
[storage]
type = "s3"

[storage.s3]
endpoint = "http://localhost:9002"
access_key = "minioadmin"
secret_key = "minioadmin"
bucket = "bsfchat-media"
region = "us-east-1"
use_path_style = true

[voice]
enabled = true
# Configure your own STUN/TURN servers for NAT traversal
# stun_uri = "stun:stun.yourdomain.com:3478"
# turn_uri = "turn:turn.yourdomain.com:3478"
# turn_username = ""
# turn_password = ""
allow_peer_to_peer = true  # Safe for LAN/local; set false in production to hide user IPs

[tls]
enabled = false
cert_file = ""
key_file = ""

# Optional: BSFChat ID identity provider
[identity]
provider_url = "http://localhost:8480"
required = false
allow_local_accounts = true
